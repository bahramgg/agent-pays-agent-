<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0052FF" />
    <title>Agent Pays Agent</title>
    <meta
      name="description"
      content="An interactive pixel-art cartoon: two agents, one x402 payment, signed on hardware."
    />

    <!-- Press Start 2P for titles / short UI; Inter for longer readable copy. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" role="main">
      <div class="stage__inner">
        <!-- The hero sprite: Buyo, gently bobbing on the Base-blue stage. -->
        <div class="hero">
          <div class="hero__shadow" aria-hidden="true"></div>
          <div class="hero__bob">
            <div
              class="hero__sprite"
              data-sprite="buyo"
              role="img"
              aria-label="Buyo, the buyer agent"
            ></div>
          </div>
        </div>

        <p class="hero__nameplate">Buyo</p>

        <header class="masthead">
          <h1 class="title">Agent Pays Agent</h1>
          <p class="subtitle">Two agents, one x402 payment, signed on hardware.</p>
        </header>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
