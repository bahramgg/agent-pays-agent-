# Render Blueprint — one-click deploy of the Agent Pays Agent demo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agent-pays-agent
    runtime: node
    plan: free
    # Build the client bundle + static assets into dist/.
    buildCommand: npm install && npm run build
    # Serve dist/ with the tiny Node server. Render sets PORT automatically.
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        # Render overrides this at runtime; declared for clarity/local parity.
        value: "3000"
    autoDeploy: true
