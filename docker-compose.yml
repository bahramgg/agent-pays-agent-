# One-command local run with REAL Ledger clear signing -- fully offline.
#
#   1. ./infra/clearsign-app/build.sh   (once: builds the test-key app)
#   2. docker compose up
#
# Then open http://localhost:3000 (the app) and http://localhost:5000 (the
# Speculos device, where you approve). The clear-signing filters for the x402
# USDC message are signed locally with the public test key (cal.pem), and the
# Speculos app is built to trust that key, so the device shows the curated
# From / To / Amount view with NO Ledger CAL, no gating token, and no blind
# signing. See infra/clearsign-app/README.md.
services:
  speculos:
    image: ghcr.io/ledgerhq/speculos:latest
    command: --model nanosp --display headless --api-port 5000 /apps/ethereum-clearsign.elf
    volumes:
      - ./infra/speculos:/apps:ro
    ports:
      - "5000:5000"

  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      USE_REAL_SIGNER: "true"
      SPECULOS_URL: "http://speculos:5000"
      # Public URL the browser uses to open the signer for approval.
      SPECULOS_PUBLIC_URL: "http://localhost:5000"
      PORT: "3000"
    volumes:
      - .:/app
      # Keep container node_modules separate from any host install.
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - speculos
