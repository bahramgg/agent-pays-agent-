# One-command local run with real signing on the Ledger Agent Stack (DMK).
#
#   1. ./infra/clearsign-app/build.sh   (once: builds the Ethereum app .elf)
#   2. docker compose up
#
# Open http://localhost:3000 (the app) and http://localhost:5000 (the Speculos
# device, where you approve). Signing goes through the Device Management Kit
# (@ledgerhq/device-signer-kit-ethereum + context-module). CURATED clear signing
# (From / To / "0.01 USDC") requires a valid partner originToken: set
# LEDGER_ORIGIN_TOKEN below and run on a network where Ledger's CAL is reachable.
# Without a token the device shows raw fields / blind signing -- Ledger's
# documented behavior. Speculos uses its test seed; settlement stays simulated.
services:
  speculos:
    image: ghcr.io/ledgerhq/speculos:latest
    command: --model nanosp --display headless --api-port 5000 /apps/ethereum.elf
    volumes:
      - ./infra/speculos:/apps:ro
    ports:
      - "5000:5000"

  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      USE_REAL_SIGNER: "true"
      SPECULOS_URL: "http://speculos:5000"
      # Public URL the browser uses to open the signer for approval.
      SPECULOS_PUBLIC_URL: "http://localhost:5000"
      # Partner token that unlocks curated clear signing (empty = raw/blind).
      LEDGER_ORIGIN_TOKEN: "${LEDGER_ORIGIN_TOKEN:-}"
      PORT: "3000"
    volumes:
      - .:/app
      # Keep container node_modules separate from any host install.
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - speculos
